<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MC Skin Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/skinview3d@3.0.1/bundles/skinview3d.bundle.js"></script>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:#05070d;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}


#glow{
    position:fixed;
    width:140px;
    height:140px;
    background:radial-gradient(circle, rgba(56,189,248,0.25), transparent 60%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:1;
}


.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:#38bdf8;
    opacity:0.6;
    animation:float 6s linear infinite;
}
@keyframes float{
    from{transform:translateY(0)}
    to{transform:translateY(-120vh)}
}

h1{
    text-align:center;
    margin:18px 0;
    font-size:22px;
    letter-spacing:2px;
    color:#38bdf8;
    text-shadow:0 0 12px #38bdf8;
}

/* ===== GRID ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    padding:14px;
    max-width:720px;
    margin:auto;
    position:relative;
    z-index:2;
}

.card{
    background:#0b1220;
    border-radius:12px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    border:1px solid #0ea5e9;
    transition:0.2s;
    position:relative;
    overflow:hidden;
}

.card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(56,189,248,0.25), transparent);
    transform:translateX(-100%);
}

.card:hover::after{
    transform:translateX(100%);
    transition:0.6s;
}

.card:hover{
    transform:scale(1.06);
    box-shadow:0 0 20px rgba(56,189,248,0.5);
}

.card img{
    width:100%;
    image-rendering:pixelated;
}

.card-name{
    margin-top:8px;
    font-size:14px;
    letter-spacing:1px;
}

.panel{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:3;
}

.panel-box{
    background:#0b1220;
    border-radius:14px;
    padding:14px;
    width:360px;
    border:1px solid #38bdf8;
    box-shadow:0 0 30px rgba(56,189,248,0.5);
}

#viewer{
    width:100%;
    height:280px;
}

.buttons{
    display:flex;
    gap:8px;
    margin-top:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.96);
}
</style>
</head>

<body>

<div id="glow"></div>

<h1>SKIN LAUNCHER</h1>

<div class="grid">
    <div class="card" onclick="openSkin('1','Steve')">
        <img src="1.png">
    </div>
    <div class="card" onclick="openSkin('2','Alex')">
        <img src="2.png">
    </div>
    <div class="card" onclick="openSkin('3.png','Ninja')">
        <img src="3.png">
    </div>
    <div class="card" onclick="openSkin('4.png','Fuego')">
        <img src="4.png">
    </div>
    <div class="card" onclick="openSkin('5.png','Hielo')">
        <img src="5.png">
    </div>
    <div class="card" onclick="openSkin('6.png','Pro')">
        <img src="6.png">
    </div>
</div>

<div class="panel" id="panel">
    <div class="panel-box">
        <h1 id="skinTitle" style="font-size:16px;margin:4px 0;"></h1>
        <div id="viewer"></div>
        <div class="buttons">
            <button onclick="download()">DOWNLOAD</button>
            <button onclick="closePanel()">CLOSE</button>
        </div>
    </div>
</div>

<script>
document.addEventListener("mousemove", e=>{
    const g = document.getElementById("glow");
    g.style.left = e.clientX+"px";
    g.style.top = e.clientY+"px";
});

for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";
    p.style.animationDuration=4+Math.random()*6+"s";
    document.body.appendChild(p);
}

let viewer;
let currentURL="";

function openSkin(file,name){
    const base="https://cdn.jsdelivr.net/gh/TU-USUARIO/TU-REPO/skins/";
    currentURL=base+file;

    document.getElementById("panel").style.display="flex";
    document.getElementById("skinTitle").textContent=name;

    if(viewer){
        viewer.loadSkin(currentURL);
        return;
    }

    viewer=new skinview3d.SkinViewer({
        width:320,
        height:280,
        skin:currentURL
    });

    viewer.renderer.setPixelRatio(1);
    viewer.camera.position.set(0,16,36);
    viewer.zoom=0.9;

    const control=new skinview3d.OrbitControls(viewer.camera,viewer.canvas);
    control.enableZoom=false;
    control.enablePan=false;

    viewer.animations.add(new skinview3d.IdleAnimation());
    document.getElementById("viewer").appendChild(viewer.canvas);
}

function closePanel(){
    document.getElementById("panel").style.display="none";
}

function download(){
    const a=document.createElement("a");
    a.href=currentURL;
    a.download="";
    a.click();
}
</script>

</body>
</html>
