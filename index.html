<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HoHo Games | Ultimate Hub</title>

<script>
window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg:#050505;
    --accent:#1e8b03;
    --accent-glow:rgba(255, 255, 255, 0.5);
    --card-bg:#111;
    --curve:cubic-bezier(.4,0,.2,1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:var(--bg);color:white;min-height:100vh;overflow:hidden}

/* HUB */
#main-hub{
    padding:20px;
    transition:.6s var(--curve);
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    overflow-y:auto;
}
.hub-exit{
    opacity:0;
    transform:translateY(50px) scale(.9);
    filter:blur(15px);
    pointer-events:none;
}

header{
    width:100%;
    max-width:1100px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 0;
}

.hub-btn{
    width:60px;
    height:60px;
    background:var(--card-bg);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    border:1px solid rgba(255,255,255,.1);
    transition:.4s cubic-bezier(.175,.885,.32,1.275);
    overflow:hidden;
}
.hub-btn::after{
    content:'';
    position:absolute;
    inset:0;
    background:var(--accent);
    transform:scale(0);
    border-radius:50%;
    transition:.4s;
}
.hub-btn i{z-index:2}
.hub-btn:hover{
    transform:scale(1.15);
    border-color:var(--accent);
    box-shadow:0 0 20px var(--accent-glow);
}
.hub-btn:hover::after{transform:scale(1)}

/* GRID */
#games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:25px;
    width:100%;
    max-width:1100px;
    margin-top:30px;
}
.game-card{
    background:var(--card-bg);
    border-radius:25px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.05);
    transition:.4s var(--curve);
}
.game-card:hover{
    transform:translateY(-10px);
    border-color:var(--accent);
}
.img-box{height:140px}
.game-card img{width:100%;height:100%;object-fit:cover}

/* MODALS */
.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.8);
    width:90%;
    max-width:420px;
    background:#0a0a0a;
    padding:35px;
    border-radius:30px;
    border:2px solid var(--accent);
    z-index:3000;
    display:none;
    opacity:0;
    transition:.4s var(--curve);
}
.modal.active{
    display:block;
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

select,input{
    width:100%;
    padding:15px;
    margin:10px 0;
    background:#151515;
    border:1px solid #333;
    color:white;
    border-radius:12px;
}

/* ACTION BUTTONS — RESTORED ANIMATIONS */
.btn-action{
    padding:12px 20px;
    border-radius:12px;
    border:none;
    font-weight:800;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    transition:.35s cubic-bezier(.175,.885,.32,1.275);
}
.btn-action::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.12);
    transform:scaleX(0);
    transform-origin:left;
    transition:.35s;
}
.btn-action:hover{
    transform:scale(1.08);
    box-shadow:0 0 18px var(--accent-glow);
}
.btn-action:hover::after{transform:scaleX(1)}

.b-accent{background:var(--accent);color:white}

/* LAUNCHER */
#pre-launcher{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.98);
    z-index:4000;
    display:none;
    align-items:center;
    justify-content:center;
}
#pre-launcher.active{display:flex}

.launcher-ui{
    text-align:center;
    transform:scale(.7);
    transition:.6s var(--curve);
}
#pre-launcher.active .launcher-ui{transform:scale(1)}

.controller-icon{
    font-size:7rem;
    color:var(--accent);
    filter:drop-shadow(0 0 15px var(--accent-glow));
    animation:pulse 2s infinite;
}

/* CLEAN X */
.close-x{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#111;
    color:var(--accent);
    font-size:1.6rem;
    font-weight:900;
    border:2px solid var(--accent);
}
.close-x:hover{
    background:var(--accent);
    color:#000;
}

/* GAME VIEW */
#game-view{
    position:fixed;
    inset:0;
    background:#000;
    z-index:5000;
    display:none;
    flex-direction:column;
    opacity:0;
    transform:scale(1.1);
    filter:blur(10px);
    transition:.7s var(--curve);
}
#game-view.active{
    display:flex;
    opacity:1;
    transform:scale(1);
    filter:blur(0);
}
.view-bar{
    padding:15px 30px;
    background:#050505;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--accent);
}
iframe{flex:1;border:none;width:100%;height:100%}

@keyframes pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.1)}
}
</style>
</head>

<body>

<div id="main-hub">
<header>
    <div style="font-size:2.5rem;font-weight:900;color:var(--accent)">HOHO</div>
    <div style="display:flex;gap:15px">
        <div class="hub-btn" onclick="openModal('acc-modal')"><i class="fas fa-user"></i></div>
        <div class="hub-btn" onclick="openModal('set-modal')"><i class="fas fa-cog"></i></div>
        <div class="hub-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></div>
    </div>
</header>

<input id="search" placeholder="Search library..." oninput="doSearch()" style="max-width:600px;width:100%;padding:15px">

<main id="games-grid"></main>
</div>

<!-- SETTINGS -->
<div id="set-modal" class="modal">
<h2 style="color:var(--accent)">Settings</h2>
<label>Panic Redirect (`)</label>
<select id="panic-url">
    <option value="https://classroom.google.com">Google Classroom</option>
    <option value="https://www.google.com">Google</option>
</select>
<label>Tab Cloaking</label>
<select id="cloak-picker" onchange="setTab()">
    <option value="default">Default</option>
    <option value="classroom">Classes</option>
    <option value="drive">My Drive</option>
</select>
<button class="btn-action b-accent" style="width:100%" onclick="closeModal()">Save</button>
</div>

<!-- ACCOUNT -->
<div id="acc-modal" class="modal">
<h2 style="color:var(--accent)">Profile</h2>
<input id="user-name" placeholder="Nickname">
<button class="btn-action b-accent" style="width:100%" onclick="closeModal()">Update</button>
</div>

<!-- LAUNCHER -->
<div id="pre-launcher">
<div class="launcher-ui">
    <i class="fas fa-gamepad controller-icon"></i>
    <h1 id="l-name"></h1>
    <p style="opacity:.6">Ready to play?</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn-action b-accent" onclick="startSmooth()"><i class="fas fa-play"></i> PLAY</button>
        <button class="btn-action" style="background:#2ecc71;color:white" onclick="launchTab()">NEW TAB</button>
        <button class="btn-action" style="background:#6c5ce7;color:white" onclick="stealthMode()">STEALTH</button>
        <button class="btn-action close-x" onclick="cancelLaunch()">X</button>
    </div>
</div>
</div>

<!-- GAME VIEW -->
<div id="game-view">
<div class="view-bar">
    <h3 id="vp-title">HoHo Engine</h3>
    <button class="btn-action" style="background:#e74c3c;color:white" onclick="exitGame()">EXIT</button>
</div>
<iframe id="game-frame"></iframe>
</div>

<script>
const games = [
    { title:"Tag", path:"games/Tag.html", img:"img/tag.png" },
    { title:"eaglercraft", path:"games/eaglercraft.html", img:"img/eaglercraft.png" },
    { title:"bad parenting", path:"games/badparenting/", img:"img/badparenting.png" },
    { title:"bunny ada", path:"games/bunny-ada/", img:"img/bunnyada.gif" },
    { title:"Get Yoked", path:"games/getyoked.html", img:"img/getyoked.png" },
    { title:"PixelClient", path:"games/PixelClient.html", img:"img/getyoked.png" },
    { title:"Walters Lab", path:"games/Walterlab.html", img:"img/walterlab.png" },
    { title:"Tag 2", path:"games/Tag2.html", img:"img/tag2.png" },
    { title:"New Game 2", path:"games/newgame2/index.html", img:"img/newgame2.png" }
];

let selected=null;

function render(data){
    const grid=document.getElementById("games-grid");
    grid.innerHTML="";
    data.forEach(g=>{
        const card=document.createElement("div");
        card.className="game-card";
        card.innerHTML=`<div class="img-box"><img src="${g.img}" onerror="this.src='https://via.placeholder.com/300/000/ff4757?text=HoHo'"></div><div style="padding:15px;text-align:center">${g.title}</div>`;
        card.onclick=()=>{
            selected=g;
            document.getElementById("l-name").innerText=g.title;
            document.getElementById("main-hub").classList.add("hub-exit");
            setTimeout(()=>document.getElementById("pre-launcher").classList.add("active"),300);
        };
        grid.appendChild(card);
    });
}

function startSmooth(){
    if(!selected)return;
    document.getElementById("pre-launcher").classList.remove("active");
    const view=document.getElementById("game-view");
    document.getElementById("game-frame").src=selected.path;
    document.getElementById("vp-title").innerText=selected.title;
    view.style.display="flex";
    setTimeout(()=>view.classList.add("active"),50);
}

function exitGame(){
    const view=document.getElementById("game-view");
    view.classList.remove("active");
    setTimeout(()=>{
        view.style.display="none";
        document.getElementById("game-frame").src="";
        selected=null;
        document.getElementById("main-hub").classList.remove("hub-exit");
    },600);
}

function cancelLaunch(){
    document.getElementById("pre-launcher").classList.remove("active");
    document.getElementById("main-hub").classList.remove("hub-exit");
}

function launchTab(){ if(selected) window.open(selected.path,"_blank"); }

function stealthMode(){
    if(!selected)return;
    const win=window.open("about:blank","_blank");
    win.document.write(`<title>Classes</title><iframe src="${selected.path}" style="width:100vw;height:100vh;border:none"></iframe>`);
}

function setTab(){
    const v=document.getElementById("cloak-picker").value;
    if(v==="classroom")document.title="Classes";
    else if(v==="drive")document.title="My Drive";
    else document.title="HoHo Games";
}

window.onkeydown=e=>{
    if(e.key==="`")window.location.href=document.getElementById("panic-url").value;
};

function openModal(id){document.getElementById(id).classList.add("active")}
function closeModal(){document.querySelectorAll(".modal").forEach(m=>m.classList.remove("active"))}
function doSearch(){
    const t=document.getElementById("search").value.toLowerCase();
    render(games.filter(g=>g.title.toLowerCase().includes(t)));
}

render(games);
</script>

</body>
</html>
